name: Adhahi Bot
on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          NIN: ${{ secrets.NIN }}
          PASSWORD: ${{ secrets.PASSWORD }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
